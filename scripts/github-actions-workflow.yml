# GitHub Actions Workflow for Building APK
# 
# IMPORTANT: This file needs to be manually added to your repository at
# .github/workflows/build.yml because the GitHub token used doesn't have
# the 'workflow' scope permission.
#
# To add it manually:
# 1. Go to https://github.com/hhmonta/p2p-arbitrage-monitor
# 2. Create new file: .github/workflows/build.yml
# 3. Paste the content below
# 4. Commit directly to main
#
# Alternatively, generate a new token with 'workflow' scope at:
# https://github.com/settings/tokens

name: Flutter Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2p-arbitrage-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2p-arbitrage-monitor-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
