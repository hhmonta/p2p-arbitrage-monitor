name: p2p_arbitrage_monitor
description: P2P USDT Price Monitor & Arbitrage Detector for Binance, Bybit & BingX
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # CSV Export
  csv: ^6.0.0
  permission_handler: ^11.1.0
  share_plus: ^7.2.1
  
  # UI Utilities
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  intl: ^0.19.0
  
  # Misc
  uuid: ^4.2.1
  logger: ^2.0.2
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
